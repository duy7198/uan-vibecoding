<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Từ Tester đến Builder — Vibe Coding Talk</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: 'Segoe UI', system-ui, -apple-system, sans-serif; background: #000; overflow: hidden; }
  .slide-container { width: 100vw; height: 100vh; display: flex; flex-direction: column; }
  .slide { flex: 1; display: flex; align-items: center; justify-content: center; padding: 40px 32px; transition: opacity 0.4s ease; position: relative; overflow: hidden; }
  .slide-inner { max-width: 820px; width: 100%; z-index: 1; }
  .nav { background: #111; padding: 12px 24px; display: flex; align-items: center; justify-content: space-between; border-top: 1px solid #222; }
  .nav button { border: none; border-radius: 8px; padding: 10px 20px; cursor: pointer; font-size: 15px; font-weight: 600; transition: background 0.2s; }
  .nav button:disabled { cursor: default; }
  .btn-prev { background: #333; color: #fff; }
  .btn-prev:disabled { background: #222; color: #555; }
  .btn-next { background: #f7c948; color: #000; }
  .btn-next:disabled { background: #222; color: #555; }
  .dots { display: flex; align-items: center; gap: 6px; }
  .dot { height: 8px; border-radius: 4px; cursor: pointer; transition: all 0.3s ease; background: #444; width: 8px; }
  .dot.active { background: #f7c948; width: 24px; }
  .footer { background: #111; padding: 4px 24px 8px; text-align: center; color: #555; font-size: 12px; }
  .card { background: rgba(255,255,255,0.08); border-radius: 14px; padding: 20px 28px; min-width: 140; text-align: center; }
  .card-icon { font-size: 40px; }
  .card-label { font-size: 17px; margin-top: 8px; font-weight: 600; color: #fff; }
  .quote { background: rgba(247,201,72,0.15); border-left: 4px solid #f7c948; padding: 14px 22px; border-radius: 8px; max-width: 560px; margin: 0 auto; font-size: 18px; font-style: italic; text-align: left; color: #fff; }
  .role-card { background: rgba(255,255,255,0.06); border-radius: 16px; padding: 24px; flex: 1 1 240px; max-width: 300px; text-align: left; color: #fff; }
  .role-icon { font-size: 40px; margin-bottom: 12px; text-align: center; }
  .role-title { font-size: 18px; font-weight: 700; color: #60a5fa; margin-bottom: 8px; text-align: center; }
  .role-desc { font-size: 15px; opacity: 0.8; line-height: 1.6; }
  .video-box { background: rgba(96,165,250,0.15); border-radius: 12px; padding: 16px 24px; max-width: 520px; margin: 0 auto 20px; }
  .video-inner { background: rgba(0,0,0,0.3); border-radius: 8px; padding: 32px 24px; font-size: 15px; }
  .video-inner a { color: #60a5fa; text-decoration: underline; }
  .step { background: rgba(255,255,255,0.08); border-radius: 12px; padding: 14px 20px; display: flex; gap: 16px; align-items: center; text-align: left; color: #fff; }
  .step-num { width: 44px; height: 44px; border-radius: 50%; background: rgba(96,165,250,0.3); color: #60a5fa; font-size: 18px; font-weight: 800; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
  .step-icon { font-size: 28px; flex-shrink: 0; }
  .step-title { font-size: 17px; font-weight: 700; }
  .step-desc { font-size: 14px; opacity: 0.65; margin-top: 2px; }
  .hidden { display: none; }
  h1, h2, p, div { color: #fff; }
  @media (max-width: 600px) {
    .slide { padding: 16px 12px; }
    .slide-inner { max-width: 100%; }
    h1 { font-size: 28px !important; }
    h2 { font-size: 24px !important; }
    p { font-size: 16px !important; }
    .cards-row, .roles-row { flex-direction: column; align-items: center; gap: 12px !important; }
    .card { padding: 14px 18px; min-width: auto !important; }
    .card-icon { font-size: 32px !important; }
    .card-label { font-size: 15px !important; }
    .role-card { padding: 16px; max-width: 100%; }
    .role-title { font-size: 16px !important; }
    .role-desc { font-size: 14px !important; }
    .quote { font-size: 15px !important; padding: 12px 16px; }
    .video-box { padding: 12px 16px; }
    .step { padding: 10px 14px; gap: 12px; }
    .step-num { width: 36px; height: 36px; font-size: 15px; }
    .step-icon { font-size: 22px; }
    .step-title { font-size: 15px; }
    .step-desc { font-size: 13px; }
    .nav { padding: 10px 12px; }
    .nav button { padding: 8px 14px; font-size: 14px; }
    .dot { height: 6px; width: 6px; }
    .dot.active { width: 18px; }
    [style*="font-size:80px"] { font-size: 48px !important; }
    [style*="font-size:52px"] { font-size: 28px !important; }
    [style*="font-size:48px"] { font-size: 28px !important; }
    [style*="font-size:42px"] { font-size: 26px !important; }
    [style*="font-size:36px"] { font-size: 24px !important; }
    [style*="font-size:24px"] { font-size: 18px !important; }
    [style*="font-size:22px"] { font-size: 17px !important; }
    [style*="font-size:20px"] { font-size: 16px !important; }
    [style*="font-size:18px"] { font-size: 15px !important; }
  }
</style>
</head>
<body>
<div class="slide-container">
  <div class="slide" id="slide-area"></div>
  <div class="nav">
    <button class="btn-prev" id="prevBtn" onclick="prev()">← Trước</button>
    <div class="dots" id="dots"></div>
    <button class="btn-next" id="nextBtn" onclick="next()">Tiếp →</button>
  </div>
  <div class="footer" id="footerText"></div>
</div>

<script>
const slides = [
  {
    bg: "linear-gradient(135deg, #0f0c29, #302b63, #24243e)",
    html: `
      <div style="text-align:center">
        <div style="font-size:80px;margin-bottom:20px">🧪 → 🚀</div>
        <h1 style="font-size:48px;font-weight:800;margin:0 0 16px;line-height:1.2">
          Từ <span style="color:#f7c948">Tester</span> đến <span style="color:#48f7c9">Builder</span>
        </h1>
        <p style="font-size:24px;opacity:0.8;margin:0 0 8px">Hành trình Vibe Coding của một QA Engineer</p>
        <div style="margin-top:40px;padding:12px 28px;background:rgba(255,255,255,0.1);border-radius:50px;display:inline-block;font-size:18px">
          Duy — QA Engineer @ Axon
        </div>
      </div>`
  },
  {
    bg: "linear-gradient(135deg, #1a1a2e, #16213e)",
    html: `
      <div style="text-align:center">
        <h2 style="font-size:38px;font-weight:700;color:#f7c948;margin:0 0 24px">👋 Mình là Duy</h2>
        <div class="cards-row" style="display:flex;justify-content:center;gap:24px;flex-wrap:wrap;margin-bottom:24px">
          <div class="card"><div class="card-icon">🧪</div><div class="card-label">QA Engineer</div></div>
          <div class="card"><div class="card-icon">🏢</div><div class="card-label">Axon</div></div>
          <div class="card"><div class="card-icon">🚫</div><div class="card-label">Không phải Dev</div></div>
        </div>
      </div>`
  },
  {
    bg: "linear-gradient(135deg, #0d1b2a, #1b263b)",
    html: `
      <div style="text-align:center">
        <h2 style="font-size:38px;font-weight:700;color:#60a5fa;margin:0 0 28px">🔍 Vai trò của QA</h2>
        <div class="roles-row" style="display:flex;justify-content:center;gap:24px;flex-wrap:wrap;margin-bottom:28px">
          <div class="role-card">
            <div class="role-icon">📋</div>
            <div class="role-title">Kiểm tra sản phẩm</div>
            <div class="role-desc">Sản phẩm dev làm ra có đúng với đặc tả và yêu cầu ban đầu không?</div>
          </div>
          <div class="role-card">
            <div class="role-icon">👁️</div>
            <div class="role-title">Góc nhìn người dùng</div>
            <div class="role-desc">Dùng trải nghiệm thực tế để phản hồi dev, giúp cải thiện sản phẩm.</div>
          </div>
        </div>
        <div class="video-box">
          <div style="font-size:18px;margin-bottom:8px">🎬 Xem video này để hiểu rõ hơn nha!</div>
          <div class="video-inner">
            📌 Phát video: <a href="https://vt.tiktok.com/ZSuDqT1MH/" target="_blank" rel="noopener noreferrer">https://vt.tiktok.com/ZSuDqT1MH/</a>
          </div>
        </div>
        <div class="quote">"Không có QA, bug sẽ do user tìm giúp — miễn phí, kèm 1-star review."</div>
      </div>`
  },
  {
    bg: "linear-gradient(135deg, #1a0a2e, #2d1b69)",
    html: `
      <div style="text-align:center">
        <h2 style="font-size:38px;font-weight:700;color:#c084fc;margin:0 0 16px">🎤 Tại sao mình ở đây?</h2>
        <p style="font-size:20px;opacity:0.7;margin:0 0 32px">Chia sẻ kinh nghiệm thực tế</p>
        <div style="max-width:560px;margin:0 auto;display:flex;flex-direction:column;gap:20px">
          <div style="background:rgba(255,255,255,0.06);border-radius:16px;padding:24px 28px;text-align:left;display:flex;gap:16px;align-items:center">
            <div style="font-size:48px">🙅</div>
            <div>
              <div style="font-size:20px;font-weight:700;color:#f87171">Chưa từng code ra sản phẩm</div>
              <div style="font-size:16px;opacity:0.7;margin-top:4px">Mình là QA, không phải developer</div>
            </div>
          </div>
          <div style="font-size:36px;text-align:center">⬇️</div>
          <div style="background:rgba(255,255,255,0.06);border-radius:16px;padding:24px 28px;text-align:left;display:flex;gap:16px;align-items:center">
            <div style="font-size:48px">🚀</div>
            <div>
              <div style="font-size:20px;font-weight:700;color:#48f7c9">Vẫn Vibe Coding ra sản phẩm</div>
              <div style="font-size:16px;opacity:0.7;margin-top:4px">Phục vụ nhu cầu cá nhân, bằng AI</div>
            </div>
          </div>
        </div>
        <div style="margin-top:28px;background:rgba(192,132,252,0.15);border-radius:12px;padding:14px 24px;max-width:480px;margin:28px auto 0;font-size:19px;font-weight:600">
          💡 Nếu mình làm được — bạn cũng làm được!
        </div>
      </div>`
  },
  {
    bg: "linear-gradient(135deg, #000428, #004e92)",
    html: `
      <div style="text-align:center">
        <div style="font-size:80px;margin-bottom:16px">🖥️</div>
        <h2 style="font-size:42px;font-weight:800;margin:0 0 16px">DEMO TIME</h2>
        <p style="font-size:22px;opacity:0.8;margin:0 0 32px">Live demo + Tips thực chiến</p>
        <div style="max-width:580px;margin:0 auto;display:flex;flex-direction:column;gap:12px">
          <div class="step"><div class="step-num">1</div><div class="step-icon">📝</div><div><div class="step-title">Plan trước khi code</div><div class="step-desc">Mô tả chi tiết: chức năng, giao diện, kết quả mong đợi</div></div></div>
          <div class="step"><div class="step-num">2</div><div class="step-icon">🔎</div><div><div class="step-title">Review & chỉnh sửa plan</div><div class="step-desc">Đọc lại, bổ sung, đảm bảo rõ ràng trước khi bắt đầu</div></div></div>
          <div class="step"><div class="step-num">3</div><div class="step-icon">🤖</div><div><div class="step-title">AI code</div><div class="step-desc">Đưa plan cho AI, để AI viết code</div></div></div>
          <div class="step"><div class="step-num">4</div><div class="step-icon">🧪</div><div><div class="step-title">Test sản phẩm</div><div class="step-desc">Bấm thử mọi chỗ, tìm lỗi, kiểm tra kết quả</div></div></div>
        </div>
        <div style="margin-top:20px;display:flex;justify-content:center;align-items:center;gap:8px">
          <span style="font-size:24px">🔄</span>
          <span style="font-size:17px;opacity:0.7;font-style:italic">Lặp lại cho đến khi ưng ý!</span>
        </div>
      </div>`
  },
  {
    bg: "linear-gradient(135deg, #0f0c29, #302b63, #24243e)",
    html: `
      <div style="text-align:center">
        <div style="font-size:80px;margin-bottom:24px">🎉</div>
        <h1 style="font-size:52px;font-weight:800;margin:0 0 16px;line-height:1.2">
          Happy <span style="color:#f7c948">Vibe</span> <span style="color:#48f7c9">Coding</span>!
        </h1>
        <div style="margin-top:32px;font-size:16px;opacity:0.5">Cảm ơn các bạn đã lắng nghe! 🙏</div>
      </div>`
  }
];

let current = 0;
const slideArea = document.getElementById("slide-area");
const dotsEl = document.getElementById("dots");
const prevBtn = document.getElementById("prevBtn");
const nextBtn = document.getElementById("nextBtn");
const footerText = document.getElementById("footerText");

function render() {
  const s = slides[current];
  slideArea.style.background = s.bg;
  slideArea.innerHTML = '<div class="slide-inner">' + s.html + '</div>';
  prevBtn.disabled = current === 0;
  nextBtn.disabled = current === slides.length - 1;
  nextBtn.style.background = current === slides.length - 1 ? "#222" : "#f7c948";
  nextBtn.style.color = current === slides.length - 1 ? "#555" : "#000";
  prevBtn.style.background = current === 0 ? "#222" : "#333";
  prevBtn.style.color = current === 0 ? "#555" : "#fff";
  dotsEl.innerHTML = "";
  slides.forEach((_, i) => {
    const d = document.createElement("div");
    d.className = "dot" + (i === current ? " active" : "");
    d.onclick = () => { current = i; render(); };
    dotsEl.appendChild(d);
  });
  footerText.textContent = "Slide " + (current+1) + " / " + slides.length + " • Dùng phím ← → hoặc bấm nút để chuyển slide";
}

function next() { if (current < slides.length - 1) { current++; render(); } }
function prev() { if (current > 0) { current--; render(); } }

document.addEventListener("keydown", (e) => {
  if (e.key === "ArrowRight" || e.key === " ") { e.preventDefault(); next(); }
  if (e.key === "ArrowLeft") { e.preventDefault(); prev(); }
});

// Touch swipe support for mobile
let touchStartX = 0;
let touchEndX = 0;
slideArea.addEventListener("touchstart", (e) => { touchStartX = e.changedTouches[0].screenX; }, { passive: true });
slideArea.addEventListener("touchend", (e) => {
  touchEndX = e.changedTouches[0].screenX;
  const diff = touchStartX - touchEndX;
  if (Math.abs(diff) > 50) { diff > 0 ? next() : prev(); }
});

render();
</script>
</body>
</html>
